baseURL = "https://fabric.acestus.com/"
locale = "en-us"
title = "Fabric CI/CD Readiness Review"

[params]
  env = "production"
  description = "Get your Microsoft Fabric workspace into Git with repeatable, drift-free deployments. Fixed-scope review — $50."

[build]
  writeStats = true

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
