{{ define "main" }}
<section class="page-hero py-5">
  <div class="container">
    <h1 class="mb-2">{{ .Title }}</h1>
    {{ with .Params.description }}<p class="lead text-white-75">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="py-5 bg-white">
  <div class="container page-content">
    {{ .Content }}
  </div>
</section>
{{ end }}
