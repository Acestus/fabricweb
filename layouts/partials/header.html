{{ $path := .RelPermalink }}
<header class="site-header sticky-top">
  <nav class="navbar navbar-expand-lg navbar-light bg-white">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="brand-wordmark">Acestus</span>
        <span class="brand-sub">Fabric Practice</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link{{ if eq $path "/" }} active{{ end }}" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link{{ if in $path "/services" }} active{{ end }}" href="/services/">Services</a></li>
          <li class="nav-item"><a class="nav-link{{ if in $path "/about" }} active{{ end }}" href="/about/">About</a></li>
          <li class="nav-item"><a class="nav-link{{ if in $path "/contact" }} active{{ end }}" href="/contact/">Contact</a></li>
          <li class="nav-item ms-lg-2 mt-3 mt-lg-0">
            <a class="btn btn-primary-cta" href="/contact/">Book Review — $50</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
